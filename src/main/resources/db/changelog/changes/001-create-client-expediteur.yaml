databaseChangeLog:
  - changeSet:
      id: 001-create-client-expediteur
      author: smartlogi
      changes:
        - createTable:
            tableName: client_expediteur
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: client_expediteur
            baseColumnNames: id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_client_expediteur_user
            onDelete: CASCADE
