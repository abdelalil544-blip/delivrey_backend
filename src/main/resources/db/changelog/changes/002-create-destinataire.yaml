databaseChangeLog:
  - changeSet:
      id: 002-create-destinataire
      author: smartlogi
      changes:
        - createTable:
            tableName: destinataire
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: destinataire
            baseColumnNames: id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_destinataire_user
            onDelete: CASCADE
