databaseChangeLog:
  - changeSet:
      id: 003-create-livreur
      author: smartlogi
      changes:
        - createTable:
            tableName: livreur
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: vehicule
                  type: varchar(50)
              - column:
                  name: zone_assignee_id
                  type: varchar(36)
        - addForeignKeyConstraint:
            baseTableName: livreur
            baseColumnNames: id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_livreur_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: livreur
            baseColumnNames: zone_assignee_id
            referencedTableName: zone
            referencedColumnNames: id
            constraintName: fk_livreur_zone
            onDelete: SET NULL